<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>One-Page Website</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }
        section {
            margin-bottom: 20px;
        }
        footer {
            text-align: center;
            padding: 10px;
            background-color: #f1f1f1;
        }
        nav {
            background-color: #333;
            padding: 10px;
        }
        nav a {
            color: white;
            padding: 10px;
            text-decoration: none;
            margin: 0 10px;
        }
        nav a:hover {
            background-color: #575757;
        }
        .lightbox-modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.85);
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .lightbox-modal img {
            max-width: 90%;
            max-height: 80%;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
            border-radius: 8px;
        }
        .lightbox-caption {
            color: #fff;
            margin-top: 12px;
            text-align: center;
            max-width: 90%;
        }
        .close-btn {
            position: absolute;
            top: 20px;
            right: 30px;
            color: #fff;
            font-size: 36px;
            font-weight: bold;
            cursor: pointer;
            user-select: none;
        }
    </style>
</head>
<body>

    <!-- Navigation Bar -->
    <nav>
        <a href="#home">Home</a>
        <a href="#pictures">Pictures</a>
        <a href="#contact">Contact</a>
        <a href="#video">Video</a>
    </nav>

    <!-- Home Page Section -->
    <section id="home">
        <h1>Welcome to My One-Page Website</h1>
        <p>This is the home page section where we can introduce ourselves and our website.</p>
    </section>

    <!-- Pictures Section -->
    <section id="pictures">
        <h2>Picture Gallery</h2>

        <img class="gallery-image" src="https://img.freepik.com/free-photo/pug-dog-isolated-white-background_2829-11416.jpg?semt=ais_hybrid&w=740&q=80"
             alt="Pug dog isolated on a white background" width="300">

        <img class="gallery-image" src="https://static.vecteezy.com/system/resources/thumbnails/008/951/892/small/cute-puppy-pomeranian-mixed-breed-pekingese-dog-run-on-the-grass-with-happiness-photo.jpg"
             alt="Cute puppy running on grass" width="300">

        <div id="lightboxModal" class="lightbox-modal">
            <span class="close-btn" aria-label="Close modal">&times;</span>
            <img id="lightboxImage" class="lightbox-content" alt="">
            <div id="lightboxCaption" class="lightbox-caption"></div>
        </div>
    </section>

    <!-- Contact Form Section -->
    <section id="contact">
        <h2>Contact Us</h2>
        <form>
            <label for="name">Name:</label><br>
            <input type="text" id="name" name="name"><br><br>

            <label for="email">Email:</label><br>
            <input type="email" id="email" name="email"><br><br>

            <input type="submit" value="Submit">
        </form>
    </section>

    <!-- Video Section -->
    <section id="video">
        <h2>Video Section</h2>
        <iframe width="560" height="315"
            src="https://www.youtube.com/embed/5MpfPbFlpNw"
            title="YouTube video"
            frameborder="0"
            allow="accelerometer; autoplay; encrypted-media; gyroscope; picture-in-picture"
            allowfullscreen>
        </iframe>
    </section>

    <!-- Footer Section -->
    <footer>
        <p>&copy; 2026 One-Page Website</p>
    </footer>

    <script src="js/script.js"></script>
</body>
</html>
